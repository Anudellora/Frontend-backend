<!-- Динамическая страница: Заметки -->
<section class="page-notes">
    <!-- Панель push-уведомлений -->
    <div class="push-controls">
        <div class="push-info">
            <svg id="push-status-icon" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M13.73 21a2 2 0 0 1-3.46 0"/>
                <path d="M18.63 13A17.89 17.89 0 0 1 18 8"/>
                <path d="M6.26 6.26A5.86 5.86 0 0 0 6 8c0 7-3 9-3 9h14"/>
                <line x1="1" y1="1" x2="23" y2="23"/>
            </svg>
            <span id="push-status-text">Проверка статуса...</span>
        </div>
        <label class="toggle-switch">
            <input type="checkbox" id="push-toggle" disabled>
            <span class="toggle-slider"></span>
        </label>
    </div>

    <form id="note-form" class="note-form">
        <div class="form-row">
            <input type="text" id="note-title" class="note-input" placeholder="Заголовок заметки..." required autocomplete="off">
            <button type="submit" class="btn-add" id="btn-add-note">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <line x1="12" y1="5" x2="12" y2="19"/>
                    <line x1="5" y1="12" x2="19" y2="12"/>
                </svg>
                <span>Добавить</span>
            </button>
        </div>
        <textarea id="note-text" class="note-textarea" placeholder="Текст заметки..." rows="3"></textarea>
        <!-- Поле для напоминания -->
        <div class="reminder-row">
            <div class="reminder-label">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <circle cx="12" cy="12" r="10"/>
                    <polyline points="12 6 12 12 16 14"/>
                </svg>
                <span>Напоминание:</span>
            </div>
            <input type="datetime-local" id="note-reminder" class="note-input reminder-input">
        </div>
    </form>

    <div id="notes-grid" class="notes-grid">
        <!-- Заметки будут добавляться сюда динамически -->
    </div>
</section>
