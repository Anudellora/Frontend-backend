global
    log stdout format raw local0

defaults
    mode http
    log global
    timeout connect 5s
    timeout client  30s
    timeout server  30s
    option httplog

frontend http_front
    bind *:8081
    default_backend http_back

backend http_back
    balance roundrobin
    option httpchk GET /health
    server server1 127.0.0.1:3001 check
    server server2 127.0.0.1:3002 check
    server server3 127.0.0.1:3003 check backup
